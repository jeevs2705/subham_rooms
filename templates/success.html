<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Subham Rooms - Booking Confirmed</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Decorative mandalas -->
<div class="mandala mandala-1">🕉️</div>
<div class="mandala mandala-2">🪔</div>

<!-- Navigation Menu -->
<div class="nav-menu">
<a href="/">🏠 Home</a>
<a href="/booking">📝 Book Room</a>
</div>

<div class="container">
<div class="box success-box">

<h1>✅ Booking Confirmed!</h1>
<p class="subtitle">॥ Subham Rooms - சுபம் அறைகள் ॥</p>

<p style="color: #2e7d32; font-size: 18px; margin: 20px 0;">{{ message }}</p>

<div class="booking-details">
<p><strong>👤 Name:</strong> {{ name }}</p>
<p><strong>🏛️ Room:</strong> {{ room }}</p>
<p><strong>👥 People:</strong> {{ people }}</p>
<p><strong>❄️ AC:</strong> {{ ac }}</p>
<p><strong>📅 Date:</strong> {{ date }}</p>
<p><strong>⏰ Time Slot:</strong> {{ time_slot }}</p>
<p><strong>💰 Price:</strong> ₹{{ price }}</p>
</div>

<a href="/">Book Another Room</a>

</div>
</div>

</body>
</html>
